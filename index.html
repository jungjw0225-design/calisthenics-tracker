<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>칼리스데닉스 트래커</title>
<link rel="apple-touch-icon" href="icon-C.png"/>
<link rel="icon" href="icon-C.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.12);
    --text: #f0f0f0;
    --text-dim: #888;
    --text-muted: #555;
    --danger: #ff4444;
    --success: #44ff88;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
    line-height: 1.6;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* 루틴앱과 동일한 폰트 체계 (Noto Sans KR 본문 / Playfair Display 큰 숫자 / DM Mono 라벨) */
  input, button, textarea, select { font-family: inherit; }
  .streak-num, .week-stat-num, .pu-daynum { font-family: 'Playfair Display', serif; }
  .current-stage-label, .sets-label, .cal-label, .section-divider, .history-date,
  .roadmap-sec-label, .backup-label, .week-title, .pu-prog-day,
  .cal-dot, .cal-day-label, .today-badge, .set-bar-val, .pu-hist-set, .pu-prog-reps,
  .stage-num, .roadmap-dot, .pu-target { font-family: 'DM Mono', monospace; }

  .header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header-title span { color: var(--accent); }
  .today-badge {
    font-size: 12px; color: var(--text-dim);
    background: var(--surface2); padding: 4px 10px; border-radius: 20px;
  }

  .tabs {
    display: flex; padding: 12px 20px 0; gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.15s; background: none;
    border-top: none; border-left: none; border-right: none;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 오늘 탭 */
  .today-section { padding: 20px; }

  .current-stage-selector {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px;
  }
  .current-stage-label {
    font-size: 11px; color: var(--text-dim); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .stage-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 10px;
    font-size: 13px; color: var(--text); outline: none; font-family: inherit;
  }
  .stage-select:focus { border-color: var(--accent); }

  .stage-card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); margin-bottom: 12px;
    overflow: hidden; transition: border-color 0.2s;
  }
  .stage-card.current { border-color: var(--accent); }
  .stage-card.completed-today { border-color: var(--success); }

  .stage-header {
    display: flex; align-items: center; padding: 14px 16px;
    cursor: pointer; gap: 12px;
  }
  .stage-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface2); display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700;
    color: var(--text-muted); flex-shrink: 0;
  }
  .stage-card.current .stage-num { background: var(--accent); color: #000; }
  .stage-card.completed-today .stage-num { background: var(--success); color: #000; }

  .stage-info { flex: 1; min-width: 0; }
  .stage-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .stage-target { font-size: 11px; color: var(--text-dim); }
  .stage-status { font-size: 20px; flex-shrink: 0; }

  .stage-body {
    display: none; padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .stage-body.open { display: block; }

  .sets-label {
    font-size: 11px; color: var(--text-dim); margin: 12px 0 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sets-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .set-row { display: flex; align-items: center; gap: 8px; }
  .set-label { font-size: 12px; color: var(--text-dim); width: 40px; flex-shrink: 0; }
  .set-input {
    flex: 1; min-width: 0; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 10px; font-size: 14px;
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-unit { font-size: 12px; color: var(--text-dim); width: 20px; flex-shrink: 0; }
  .set-remove {
    background: none; border: none; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 4px; line-height: 1;
  }
  .set-remove:hover { color: var(--danger); }

  .add-set-btn {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: var(--radius-sm); color: var(--text-dim);
    font-size: 12px; padding: 7px; cursor: pointer; width: 100%;
    transition: all 0.15s;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  .memo-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px;
    color: var(--text); outline: none; resize: none; margin-top: 8px;
    font-family: inherit; transition: border-color 0.15s; line-height: 1.6;
  }
  .memo-input:focus { border-color: var(--accent); }

  .save-btn {
    width: 100%; margin-top: 10px; padding: 10px;
    background: var(--accent); color: #000; border: none;
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn.saved { background: var(--success); }

  /* 로드맵 탭 */
  .roadmap-section { padding: 20px; }
  .roadmap-item {
    display: flex; gap: 14px; margin-bottom: 4px; position: relative;
  }
  .roadmap-item::before {
    content: ''; position: absolute; left: 15px; top: 32px;
    bottom: -4px; width: 1px; background: var(--border);
  }
  .roadmap-item:last-child::before { display: none; }
  .roadmap-dot {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface2); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    flex-shrink: 0; margin-top: 8px; z-index: 1;
  }
  .roadmap-item.done .roadmap-dot { border-color: var(--success); color: var(--success); }
  .roadmap-item.current .roadmap-dot { background: var(--accent); border-color: var(--accent); color: #000; }
  .roadmap-card {
    flex: 1; background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 4px;
  }
  .roadmap-item.current .roadmap-card { border-color: var(--accent); background: var(--accent-dim); }
  .roadmap-item.done .roadmap-card { opacity: 0.5; }
  .roadmap-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .roadmap-desc {
    font-size: 12px; color: var(--text-dim); line-height: 1.7;
    word-break: keep-all; overflow-wrap: break-word;
  }
  .roadmap-goal {
    display: inline-block; margin-top: 6px; font-size: 10px;
    background: var(--surface2); padding: 2px 8px; border-radius: 10px; color: var(--text-dim);
  }
  .roadmap-item.current .roadmap-goal { background: var(--accent); color: #000; font-weight: 700; }

  /* 기록 탭 */
  .history-section { padding: 16px 20px; }

  /* 스트릭 */
  .streak-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .streak-num {
    font-size: 36px; font-weight: 800; color: var(--accent); line-height: 1;
    flex-shrink: 0;
  }
  .streak-info { flex: 1; }
  .streak-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .streak-sub { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

  /* 차트 */
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
  }
  .chart-title {
    font-size: 12px; color: var(--text-dim); margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .chart-stage-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font-size: 11px;
    color: var(--text-dim); outline: none; font-family: inherit;
  }
  .chart-wrap { width: 100%; overflow-x: auto; }
  svg.trend-chart { display: block; }

  /* 날짜별 캘린더 도트 */
  .cal-section { margin-bottom: 16px; }
  .cal-label {
    font-size: 11px; color: var(--text-muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-day-label {
    font-size: 9px; color: var(--text-muted); text-align: center; padding: 2px 0;
  }
  .cal-dot {
    aspect-ratio: 1; border-radius: 4px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--text-muted); cursor: default;
    transition: background 0.15s;
  }
  .cal-dot.has-log { background: var(--accent-dim); }
  .cal-dot.has-log.today-dot { background: var(--accent); color: #000; font-weight: 700; }

  /* 기록 리스트 */
  .history-filter {
    display: flex; gap: 8px; margin-bottom: 14px;
    overflow-x: auto; padding-bottom: 4px;
  }
  .filter-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px; font-size: 12px;
    color: var(--text-dim); cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .history-day { margin-bottom: 18px; }
  .history-date {
    font-size: 11px; color: var(--text-muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .history-entry {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px;
  }
  .history-entry-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; padding-right: 24px; }
  .history-entry { position: relative; }
  .hist-del {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none; color: var(--text-muted);
    font-size: 13px; cursor: pointer; padding: 4px; line-height: 1; opacity: 0.55;
    transition: opacity 0.15s;
  }
  .hist-del:hover { opacity: 1; }

  /* 세트 시각화 바 */
  .set-bars { display: flex; flex-direction: column; gap: 5px; }
  .set-bar-row { display: flex; align-items: center; gap: 8px; }
  .set-bar-label { font-size: 11px; color: var(--text-muted); width: 36px; flex-shrink: 0; }
  .set-bar-track {
    flex: 1; height: 6px; background: var(--surface2);
    border-radius: 3px; overflow: hidden;
  }
  .set-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    transition: width 0.4s ease;
  }
  .set-bar-val { font-size: 12px; color: var(--text-dim); width: 32px; text-align: right; flex-shrink: 0; }

  .history-best {
    margin-top: 8px; font-size: 11px; color: var(--text-dim);
  }
  .history-best strong { color: var(--accent); }
  .history-memo {
    margin-top: 8px; font-size: 12px; color: var(--text-dim);
    font-style: italic; line-height: 1.6; word-break: keep-all;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 14px; line-height: 2;
  }
  .section-divider {
    font-size: 11px; color: var(--text-muted); margin: 16px 0 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* 세트 퀄리티 / 타이머 버튼 */
  .set-quality, .set-timer {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    padding: 6px 8px; line-height: 1; flex-shrink: 0; color: var(--text-dim);
    transition: all 0.15s;
  }
  .set-quality:hover, .set-timer:hover { border-color: var(--accent); }
  .set-quality.q-clean { border-color: var(--success); }
  .set-quality.q-shaky { border-color: #ffaa33; }
  .set-quality.q-fail  { border-color: var(--danger); }
  .set-timer.running { border-color: var(--danger); color: var(--danger); }

  /* 자동저장 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--accent); font-size: 12px; font-weight: 600;
    padding: 8px 16px; border-radius: 20px; z-index: 100;
    opacity: 0; pointer-events: none; transition: all 0.25s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 차트 지표 토글 */
  .chart-metrics { display: flex; gap: 6px; margin-bottom: 12px; }
  .metric-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 4px 10px; font-size: 11px;
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
    flex: 1; text-align: center;
  }
  .metric-chip.active {
    background: var(--accent-dim); border-color: var(--accent);
    color: var(--accent); font-weight: 600;
  }

  /* 주간 요약 카드 */
  .week-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
  }
  .week-title { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
  .week-stats { display: flex; gap: 10px; margin-bottom: 6px; }
  .week-stat {
    flex: 1; text-align: center; background: var(--surface2);
    border-radius: var(--radius-sm); padding: 10px 4px;
  }
  .week-stat-num { font-size: 22px; font-weight: 800; color: var(--accent); line-height: 1.1; }
  .week-stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
  .week-stage-row {
    display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px;
  }
  .week-stage-name { color: var(--text-dim); flex: 1; }
  .week-stage-val { color: var(--text); font-weight: 600; }

  /* 퀄리티 배지 (기록 탭) */
  .q-badge { font-size: 11px; margin-left: 3px; }

  /* 진급 배지 (로드맵) */
  .roadmap-milestone {
    display: inline-block; margin-top: 6px; margin-left: 6px; font-size: 10px;
    background: var(--success); color: #000; padding: 2px 8px;
    border-radius: 10px; font-weight: 700;
  }

  /* 데이터 백업 */
  .backup-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
  .backup-label {
    font-size: 11px; color: var(--text-muted); margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .backup-btns { display: flex; gap: 8px; }
  .backup-btn {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-dim); font-size: 12px;
    padding: 10px; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .backup-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 클라우드(Firebase) 로그인 바 */
  .cloud-bar {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:8px 20px; border-bottom:1px solid var(--border); font-size:12px;
  }
  #cloudStatus { color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cloud-btn {
    background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm);
    color:var(--text-dim); font-size:11px; font-weight:600; padding:5px 12px;
    cursor:pointer; font-family:inherit; flex-shrink:0; transition:all .15s;
  }
  .cloud-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* 종목 전환 스위처 */
  .mode-switch { display:flex; gap:6px; padding:12px 20px 0; }
  .mode-btn {
    flex:1; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-dim); font-size:13px;
    font-weight:700; padding:9px; cursor:pointer; font-family:inherit; transition:all .15s;
  }
  .mode-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

  /* 풀업: 오늘 진행 바 / 설정 */
  .pu-daybar {
    background:var(--surface); border:1px solid var(--accent);
    border-radius:var(--radius); padding:14px 16px; margin-bottom:16px;
    display:flex; align-items:center; gap:14px;
  }
  .pu-daynum { font-size:30px; font-weight:800; color:var(--accent); line-height:1; flex-shrink:0; }
  .pu-dayinfo { flex:1; min-width:0; }
  .pu-daytitle { font-size:14px; font-weight:700; margin-bottom:2px; }
  .pu-daysub { font-size:11px; color:var(--text-dim); line-height:1.5; }
  .pu-setting {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 16px; margin-bottom:16px;
    display:flex; align-items:center; gap:10px;
  }
  .pu-setting label { font-size:12px; color:var(--text-dim); flex:1; }
  .pu-setting input {
    width:70px; background:var(--surface2); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:7px 10px; font-size:14px;
    color:var(--text); outline:none; text-align:center; font-family:inherit;
  }
  .pu-setting input:focus { border-color:var(--accent); }

  /* 풀업: 세트 입력 행 */
  .pu-set-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .pu-set-label { font-size:12px; color:var(--text-dim); width:44px; flex-shrink:0; }
  .pu-target {
    font-size:11px; color:var(--accent); background:var(--accent-dim);
    border-radius:10px; padding:3px 8px; flex-shrink:0; min-width:52px; text-align:center;
  }
  .pu-input {
    flex:1; min-width:0; background:var(--surface2); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:7px 10px; font-size:14px;
    color:var(--text); outline:none;
  }
  .pu-input:focus { border-color:var(--accent); }
  .pu-rest-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:28px 16px; margin-bottom:12px; text-align:center;
  }
  .pu-rest-emoji { font-size:40px; }
  .pu-rest-text { font-size:14px; color:var(--text-dim); margin-top:8px; line-height:1.7; }

  /* 풀업: 30일 프로그램 그리드 */
  .pu-prog-row {
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:6px;
  }
  .pu-prog-row.current { border-color:var(--accent); background:var(--accent-dim); }
  .pu-prog-row.rest { opacity:0.5; }
  .pu-prog-day { font-size:12px; font-weight:700; color:var(--text-dim); width:54px; flex-shrink:0; }
  .pu-prog-row.current .pu-prog-day { color:var(--accent); }
  .pu-prog-reps { font-size:14px; font-weight:600; letter-spacing:1px; }
  .pu-prog-rest-label { font-size:12px; color:var(--text-muted); }

  /* 풀업: 기록 세트 표시 */

// 3/5/15/25RM은 같은 "파동" 구조(감소폭 d, 주당 증가 inc만 다름)를 파일에서 분석해 일반화.
// 검증: 생성기가 철봉 운동 플랜.xlsx의 5RM 30일 전체 + 15/25RM 기재값과 정확히 일치.

// 3RM: 초보자용 12일 브릿지(불규칙 — 초반 4세트). 파일 그대로.
const PULLUP_3RM = [
  [3,2,1,1],[3,2,1,1],[3,2,2,1],[3,3,2,1],[4,3,2,1], null,
  [4,3,2,1,1],[4,3,2,2,1],[4,3,3,2,1],[4,4,3,2,1],[5,4,3,2,1], null
];

// 5세트 파동 생성기: top(첫세트), d(감소폭), inc(주당 top 증가), weeks(주차 수)
function puGenProgram(top0, d, inc, weeks) {
  const prog = [];
  for (let w = 0; w < weeks; w++) {
    const top = top0 + w * inc;
    const base = [0,1,2,3,4].map(i => top - i * d);
    for (let j = 1; j <= 5; j++) {
      prog.push([1,2,3,4,5].map(p => base[p-1] + ((p > 1 && j >= 7 - p) ? d : 0)));
    }
    prog.push(null); // 휴식일
  }
  return prog;
}

function syncExerciseConfig() {

// (기존 data.currentStage / data.logs / data.pullup.* 참조가 현재 운동 상태를 가리킴)
function installAccessors(d) {
  const cur = () => d.exercises[d.currentExercise];
  ['currentStage','logs','milestones','level','beginnerStage'].forEach(k => {
    Object.defineProperty(d, k, { configurable:true, get(){ return cur()[k]; }, set(v){ cur()[k] = v; } });
  });
  Object.defineProperty(d, 'pullup', { configurable:true,
    get(){ return cur(); }, set(v){ d.exercises[d.currentExercise] = v; } });
}

// 현재 수준의 일자별 프로그램 배열(그리드형). 생성 결과는 캐시.
function puProgramFor(level) {
  const tier = puGetTier(level);
  if (tier.kind === 'beginner') return null;
  if (tier.cycle) return tier.cycle;
  if (!tier._gen) {
    // 저강도 등급(5RM 등 inc=1)은 8주(48일)까지 이어가 상위 등급으로의 '다리' 역할.
    // 고강도(15/25RM)는 5주(30일) 기본.
    const weeks = tier.inc === 1 ? 8 : 5;
    tier._gen = puGenProgram(tier.top0, tier.d, tier.inc, weeks);
  }
  return tier._gen;
}

  addLog(21, [[2, [18, 18, 17], ''], [1, [24, 23, 24], '']]);
  // 20일 전: 휴식

function normalizeData() {
  // 구버전(평면 mode/currentStage/logs/pullup) → 신버전(exercises) 마이그레이션
  if (!data.exercises) {
    data = {
      currentExercise: data.mode || 'planche',
      exercises: {
        planche: { currentStage: data.currentStage || 2, logs: data.logs || {}, milestones: data.milestones || [] },
        pullup: data.pullup || {}
      },
      updatedAt: data.updatedAt || 0
    };
  }
  if (!data.currentExercise || !EXERCISES.find(e => e.id === data.currentExercise)) data.currentExercise = 'planche';
  if (!data.exercises) data.exercises = {};
  // 운동별 상태 기본값
  const p = data.exercises.planche = data.exercises.planche || {};
  if (!p.currentStage) p.currentStage = 2;
  if (!p.logs) p.logs = {};
  if (!p.milestones) p.milestones = [];
  const u = data.exercises.pullup = data.exercises.pullup || {};
  if (!u.level || !PULLUP_TIERS[u.level]) u.level = '5RM';
  if (!u.logs) u.logs = {};
  if (!u.beginnerStage) u.beginnerStage = 1;
  if (!data.settings) data.settings = {};
  dayEndHour = data.settings.dayEndHour || 0;
  installAccessors(data);
  syncExerciseConfig();
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      // 신버전(exercises) 또는 구버전(logs 평면) 백업 모두 허용
      if (!parsed || typeof parsed !== 'object' || (!parsed.exercises && !parsed.logs))
        throw new Error('형식이 올바르지 않습니다');
      data = parsed;
      normalizeData();  // 구버전이면 자동 마이그레이션 + 게터 설치
      isDemo = false;
      saveData();
      document.getElementById('demoBanner').style.display = 'none';
      renderSwitcher();
      initStageSelect(); initChartSelect();
      applyExercise();
      renderActiveTab(activeTab);
      showToast('가져오기 완료 ✓');
    } catch (err) {
      alert('가져오기 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ─── 세트 퀄리티 유틸 ───
const QUALITY_CYCLE = [null, 'clean', 'shaky', 'fail'];
const QUALITY_ICON = { clean: '✅', shaky: '⚠️', fail: '❌' };
function qIcon(q) { return QUALITY_ICON[q] || '○'; }

// 데모 배너 표시
document.getElementById('demoBanner').style.display = isDemo ? 'flex' : 'none';

function getTodayKey() {
  const d = new Date();
  if (dayEndHour > 0 && d.getHours() < dayEndHour) {
    d.setDate(d.getDate() - 1);
  }
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function setDayEndHour(val) {
  const h = parseInt(val, 10);
  dayEndHour = (Number.isInteger(h) && h >= 0 && h <= 6) ? h : 0;
  if (!data.settings) data.settings = {};
  data.settings.dayEndHour = dayEndHour;
  saveData();
  renderActiveTab(activeTab);
  showToast('저장됨 ✓');
}

function syncDayEndSelect() {
  const sel = document.getElementById('dayEndSelect');
  if (sel) sel.value = String(dayEndHour);
}

function formatDate(key) {
  const d = new Date(key + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function formatShort(key) {
  const d = new Date(key + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function refreshTodayBadge() {
  const el = document.getElementById('todayBadge');
  if (el) el.textContent = formatDate(activeDateKey());
}
refreshTodayBadge();

function switchTab(name, el) {

  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));

  el.classList.add('active');
  activeTab = name;
  renderActiveTab(name);
}

// ─── 운동 전환 ───
function setExercise(id) {

function applyExercise() {

    lbl.textContent = formatDate(activeDateKey());

function toggleDayClose() {

}
function returnToToday() {

// ── 과거 날짜 선택 (최근 30일, 미래 불가) ──
function setupDatePicker() {
  const input = document.getElementById('datePickerInput');
  if (!input) return;
  function refreshRange() {
    const todayKey = getTodayKey();
    input.max = todayKey;
    input.min = keyAddDays(todayKey, -30);
    input.value = activeDateOverride || todayKey;
  }
  input.addEventListener('focus', refreshRange);
  input.addEventListener('click', refreshRange);
  input.addEventListener('change', e => {
    const val = e.target.value;
    activeDateOverride = (val && val !== getTodayKey()) ? val : null;
    dayCloseOverride = null;   // 과거 날짜를 직접 고르면 '하루 마감' 상태는 해제

function initStageSelect() {

function saveCurrentStage() {
  const prev = data.currentStage;
  const next = parseInt(document.getElementById('currentStageSelect').value);
  // 단계를 올릴 때만 진급(졸업) 마일스톤 기록
  if (next > prev) {
    if (!data.milestones) data.milestones = [];
    // 같은 단계 진급 기록 중복 누적 방지
    if (!data.milestones.some(m => m.to === next)) {
      data.milestones.push({ from: prev, to: next, date: getTodayKey() });

      showToast(`#${prev} → #${next} ${toStage ? toStage.name : ''} 진급! 🎉`);

function renderTodayCards() {

function getOrCreateLog(stageId) {
  const today = activeDateKey();
  if (!data.logs[today]) data.logs[today] = [];
  let log = data.logs[today].find(l => l.stageId === stageId);
  if (!log) { log = {stageId, sets:[{value:''}], memo:''}; data.logs[today].push(log); }
  return log;
}

function updateSet(stageId, i, val) {
  const l = getOrCreateLog(stageId);
  if(!l.sets[i]) l.sets[i]={};
  l.sets[i].value=val;
  autoSave();
}
function updateMemo(stageId, val) { getOrCreateLog(stageId).memo = val; autoSave(); }

// 세트 퀄리티 순환: 없음 → 클린 → 흔들림 → 실패 → 없음
function cycleQuality(stageId, i, btn) {
  const l = getOrCreateLog(stageId);
  if(!l.sets[i]) l.sets[i]={value:''};
  const cur = l.sets[i].quality || null;
  const next = QUALITY_CYCLE[(QUALITY_CYCLE.indexOf(cur)+1) % QUALITY_CYCLE.length];
  l.sets[i].quality = next;
  btn.textContent = qIcon(next);
  btn.className = 'set-quality q-' + (next || 'none');
  autoSave();
}

// 내장 카운트업 타이머: 3초 카운트다운 후 시작, 정지 시 2초 차감
function toggleTimer(stageId, i, btn) {
  const key = stageId + '-' + i;
  const input = btn.parentElement.querySelector('.set-input');
  if (timers[key]) {
    const isCounting = timers[key].counting;
    const elapsed = isCounting ? 0 : Math.max(0, timers[key].elapsed - 2);
    clearInterval(timers[key].iv);
    delete timers[key];
    btn.textContent = '▶'; btn.classList.remove('running');
    input.readOnly = false;
    if (isCounting) {
      input.value = '';
    } else {
      input.value = elapsed > 0 ? elapsed : '';
      updateSet(stageId, i, elapsed > 0 ? String(elapsed) : '');
    }
  } else {
    input.readOnly = true;
    let count = 3;
    input.value = count;
    btn.textContent = count;
    btn.classList.add('running');
    timers[key] = { elapsed: 0, counting: true, iv: null };
    timers[key].iv = setInterval(() => {
      if (!timers[key]) return;
      count--;
      if (count > 0) {
        input.value = count;
        btn.textContent = count;
      } else {
        clearInterval(timers[key].iv);
        timers[key].counting = false;
        btn.textContent = '■';
        const start = Date.now();
        timers[key].iv = setInterval(() => {
          if (!timers[key]) return;
          const e = Math.floor((Date.now() - start) / 1000);
          timers[key].elapsed = e;
          input.value = e;
        }, 200);
      }
    }, 1000);
  }
}

function addSet(stageId) {
  const l = getOrCreateLog(stageId); l.sets.push({value:''});
  saveData(); renderTodayCards();
}
function removeSet(stageId, i) {
  const l = getOrCreateLog(stageId);
  l.sets.splice(i,1); saveData(); renderTodayCards();
}
function saveStage(stageId) {
  const l = getOrCreateLog(stageId);
  const oldSets = l.sets;
  const inputs = document.querySelectorAll(`#sets-${stageId} .set-input`);
  l.sets = Array.from(inputs).map((inp, i) => ({
    value: inp.value,
    quality: oldSets[i] ? (oldSets[i].quality || null) : null
  }));
  const memo = document.querySelector(`#card-${stageId} .memo-input`);
  if(memo) l.memo = memo.value;
  saveData(); renderTodayCards();
  showToast('저장됨 ✓');
}

// ─── 기록 탭 ───
function calcStreak() {
  const keys = Object.keys(data.logs).filter(k => data.logs[k].some(l => l.sets.some(s=>s.value))).sort().reverse();
  if(!keys.length) return 0;
  const today = getTodayKey();
  let streak = 0, check = today;
  for(const k of keys) {
    if(k === check) { streak++; const d=new Date(check+'T00:00:00'); d.setDate(d.getDate()-1); check=d.toISOString().slice(0,10); }
    else if(k < check) break;
  }
  return streak;
}

function renderStreak() {
  const streak = calcStreak();
  const allDays = Object.keys(data.logs).filter(k => data.logs[k].some(l=>l.sets.some(s=>s.value))).length;
  document.getElementById('streakBar').innerHTML = `
    <div class="streak-bar">
      <div class="streak-num">${streak}</div>
      <div class="streak-info">
        <div class="streak-title">일 연속 운동 🔥</div>
        <div class="streak-sub">총 ${allDays}일 운동했어요</div>
      </div>
    </div>
  `;
}

// ─── 주간 요약 (이번 주: 월요일 시작) ───
function getWeekStart() {
  // 마감시간 보정된 '논리적 오늘'을 기준으로 주 경계를 잡아 getTodayKey()와 일관성 유지
  const d = new Date(getTodayKey() + 'T00:00:00');
  const offset = (d.getDay() + 6) % 7; // 월=0 기준
  d.setDate(d.getDate() - offset);
  d.setHours(0,0,0,0);
  return d;
}

function renderWeek() {
  const start = getWeekStart();
  let days = 0, totalSets = 0;
  const stageSecs = {};
  Object.keys(data.logs).forEach(k => {
    const d = new Date(k + 'T00:00:00');
    if (d < start) return;
    const logs = data.logs[k];
    if (logs.some(l => l.sets.some(s => s.value))) days++;
    logs.forEach(l => {
      l.sets.forEach(s => {
        const v = parseFloat(s.value) || 0;
        if (v > 0) { totalSets++; stageSecs[l.stageId] = (stageSecs[l.stageId] || 0) + v; }
      });
    });
  });
  const totalSecs = Object.values(stageSecs).reduce((a,b)=>a+b, 0);
  const stageRows = Object.keys(stageSecs).sort((a,b)=>a-b).map(id => {
    const st = STAGES.find(s => s.id == id);
    return `<div class="week-stage-row">
      <span class="week-stage-name">#${id} ${st ? st.name : ''}</span>
      <span class="week-stage-val">${stageSecs[id]}초</span>
    </div>`;
  }).join('') || `<div style="font-size:11px;color:var(--text-muted)">이번 주 기록이 아직 없어요</div>`;

  document.getElementById('weekCard').innerHTML = `
    <div class="week-card">
      <div class="week-title">📅 이번 주 요약</div>
      <div class="week-stats">
        <div class="week-stat"><div class="week-stat-num">${days}</div><div class="week-stat-label">운동일</div></div>
        <div class="week-stat"><div class="week-stat-num">${totalSets}</div><div class="week-stat-label">총 세트</div></div>
        <div class="week-stat"><div class="week-stat-num">${totalSecs}</div><div class="week-stat-label">총 초</div></div>
      </div>
      ${stageRows}
    </div>
  `;
}

const CHART_METRICS = [
  { key:'best',   label:'최고 기록', title:'최고 기록 트렌드' },
  { key:'avg',    label:'세트 평균', title:'세트 평균 트렌드' },
  { key:'volume', label:'총 볼륨',   title:'총 볼륨 트렌드' }
];

function renderChartMetrics() {
  document.getElementById('chartMetrics').innerHTML = CHART_METRICS.map(m =>
    `<div class="metric-chip ${chartMetric===m.key?'active':''}" onclick="setChartMetric('${m.key}')">${m.label}</div>`
  ).join('');
  const cur = CHART_METRICS.find(m => m.key === chartMetric);
  document.getElementById('chartTitleText').textContent = cur ? cur.title : '트렌드';
}

function setChartMetric(key) {
  chartMetric = key;
  renderChartMetrics();
  renderChart();
}

function metricValue(vals) {
  if (chartMetric === 'avg') return Math.round(vals.reduce((a,b)=>a+b,0) / vals.length * 10) / 10;
  if (chartMetric === 'volume') return vals.reduce((a,b)=>a+b,0);
  return Math.max(...vals);
}

function renderChart() {
  const stageId = parseInt(document.getElementById('chartStageSelect').value);
  const stage = STAGES.find(s=>s.id===stageId);
  const wrap = document.getElementById('chartWrap');

  // 날짜별 지표(최고/평균/볼륨) 수집
  const points = Object.keys(data.logs).sort().map(dateKey => {
    const log = data.logs[dateKey].find(l=>l.stageId===stageId);
    if(!log) return null;
    const vals = log.sets.map(s=>parseFloat(s.value)||0).filter(v=>v>0);
    if(!vals.length) return null;
    return { date: dateKey, val: metricValue(vals) };
  }).filter(Boolean);

  if(points.length < 2) {
    wrap.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">
      기록이 2개 이상 쌓이면<br>트렌드 차트가 나타나요
    </div>`;
    return;
  }

  const W = wrap.clientWidth || 300;
  const H = 120;
  const pad = { t:10, r:10, b:28, l:36 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const maxVal = Math.max(...points.map(p=>p.val)) * 1.15 || 10;
  const minVal = 0;

  const xStep = points.length > 1 ? cw / (points.length-1) : cw;

  const toX = i => pad.l + (points.length>1 ? i*xStep : cw/2);
  const toY = v => pad.t + ch - ((v-minVal)/(maxVal-minVal))*ch;

  // 폴리라인
  const poly = points.map((p,i)=>`${toX(i)},${toY(p.val)}`).join(' ');
  // 영역 채우기
  const area = `${toX(0)},${toY(0)} ` + poly + ` ${toX(points.length-1)},${toY(0)}`;

  // Y축 라벨 (3개)
  const yTicks = [0, Math.round(maxVal*0.5), Math.round(maxVal)];

  // X축 라벨 (최대 5개)
  const xStep2 = Math.max(1, Math.floor(points.length/5));
  const xLabels = points.filter((_,i)=> i===0 || i===points.length-1 || i%xStep2===0);

  wrap.innerHTML = `
    <svg class="trend-chart" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c8ff00" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yTicks.map(v=>`
        <line x1="${pad.l}" y1="${toY(v)}" x2="${W-pad.r}" y2="${toY(v)}"
          stroke="#2e2e2e" stroke-width="1"/>
        <text x="${pad.l-4}" y="${toY(v)+4}" text-anchor="end"
          fill="#555" font-size="9">${v}${stage.unit}</text>
      `).join('')}
      <polygon points="${area}" fill="url(#areaGrad)"/>
      <polyline points="${poly}" fill="none" stroke="#c8ff00" stroke-width="2" stroke-linejoin="round"/>
      ${points.map((p,i)=>`
        <circle cx="${toX(i)}" cy="${toY(p.val)}" r="3" fill="#c8ff00"/>
      `).join('')}
      ${xLabels.map(p=>{
        const i = points.indexOf(p);
        const d = new Date(p.date+'T00:00:00');
        const label = `${d.getMonth()+1}/${d.getDate()}`;
        return `<text x="${toX(i)}" y="${H-4}" text-anchor="middle" fill="#555" font-size="9">${label}</text>`;
      }).join('')}
    </svg>
  `;
}

function renderCal() {
  const today = getTodayKey();
  const [ty, tm] = today.split('-').map(Number);
  const year = ty;
  const month = tm - 1;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const days = ['일','월','화','수','목','금','토'];
  let html = `<div class="cal-grid">`;
  html += days.map(d=>`<div class="cal-day-label">${d}</div>`).join('');

  for(let i=0;i<firstDay;i++) html += `<div class="cal-dot"></div>`;

  for(let d=1;d<=daysInMonth;d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasLog = data.logs[key] && data.logs[key].some(l=>l.sets.some(s=>s.value));
    const isToday = key === today;
    html += `<div class="cal-dot ${hasLog?'has-log':''} ${isToday?'today-dot':''}">${d}</div>`;
  }
  html += `</div>`;
  document.getElementById('calGrid').innerHTML = html;
}

function renderHistoryList() {
  const filterContainer = document.getElementById('historyFilter');
  filterContainer.innerHTML = `
    <div class="filter-chip ${historyFilter===0?'active':''}" onclick="setHistoryFilter(0)">전체</div>
    ${STAGES.map(s=>`<div class="filter-chip ${historyFilter===s.id?'active':''}" onclick="setHistoryFilter(${s.id})">#${s.id} ${s.name}</div>`).join('')}
  `;

  const container = document.getElementById('historyList');
  const keys = Object.keys(data.logs).sort().reverse();

  if(!keys.length) {
    container.innerHTML = `<div class="empty-state">아직 기록이 없어요<br>오늘 운동을 시작해보세요 💪</div>`;
    return;
  }

  // 전체 최고 기록 계산 (바 비율용)
  const globalMax = {};
  STAGES.forEach(s => {
    let m = 0;
    Object.values(data.logs).forEach(logs => {
      const log = logs.find(l=>l.stageId===s.id);
      if(log) { const vals=log.sets.map(x=>parseFloat(x.value)||0); m=Math.max(m,...vals); }
    });
    globalMax[s.id] = m || 1;
  });

  container.innerHTML = keys.map(dateKey => {
    const logs = data.logs[dateKey].filter(l =>
      (historyFilter===0 || l.stageId===historyFilter) && l.sets.some(s=>s.value)
    );
    if(!logs.length) return '';
    return `
      <div class="history-day">
        <div class="history-date">${formatDate(dateKey)}</div>
        ${logs.map(log => {
          const stage = STAGES.find(s=>s.id===log.stageId);
          const vals = log.sets.map(s=>parseFloat(s.value)||0).filter(v=>v>0);
          if(!vals.length) return '';
          const best = Math.max(...vals);
          const barsHtml = log.sets.map((s,i) => {
            const v = parseFloat(s.value) || 0;
            if (v <= 0) return '';
            const pct = Math.round(v/globalMax[stage.id]*100);
            const qb = s.quality ? `<span class="q-badge">${qIcon(s.quality)}</span>` : '';
            return `
              <div class="set-bar-row">
                <span class="set-bar-label">세트 ${i+1}</span>
                <div class="set-bar-track">
                  <div class="set-bar-fill" style="width:${pct}%"></div>
                </div>
                <span class="set-bar-val">${v}${stage.unit}${qb}</span>
              </div>
            `;
          }).join('');
          return `
            <div class="history-entry">
              <button class="hist-del" onclick="deletePlancheLog('${dateKey}', ${log.stageId})" title="기록 삭제">🗑</button>
              <div class="history-entry-name">#${stage.id} ${stage.name}</div>
              <div class="set-bars">${barsHtml}</div>
              <div class="history-best">최고 <strong>${best}${stage.unit}</strong> · ${vals.length}세트</div>
              ${log.memo ? `<div class="history-memo">"${log.memo}"</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }).join('');
}

// 플란체: 특정 날짜·단계 기록 삭제
function deletePlancheLog(dateKey, stageId) {
  const arr = data.logs[dateKey];
  if (!arr) return;
  const stage = STAGES.find(s => s.id === stageId);
  if (!confirm(`${formatDate(dateKey)}\n${stage ? '#'+stage.id+' '+stage.name : ''} 기록을 삭제할까요?`)) return;
  data.logs[dateKey] = arr.filter(l => l.stageId !== stageId);

  saveData();
  renderHistory();
  showToast('기록 삭제됨 🗑');
}

// ═══════════════ 풀업 (러시안 파이터 풀업) ═══════════════
function puProgLen() { const p = puProgramFor(data.pullup.level); return p ? p.length : 0; }
function puTargets(day) {
  const prog = puProgramFor(data.pullup.level);
  if (!prog) return null;
  const base = prog[day-1];
  return base ? base.slice() : null;
}
function puNextDay(d) { const len = puProgLen() || 30; return d >= len ? 1 : d + 1; }
// 레벨 지정판 puNextDay. 폴백 30은 cycle 없는 비정상 레벨에만 닿음(3RM=12 등 실제 길이는 puProgramFor가 제공).
function puNextDayFor(level, d) { const p = puProgramFor(level); const len = (p ? p.length : 0) || 30; return d >= len ? 1 : d + 1; }
// 모든 풀업 로그에 '통과 횟수' 기반 위치(Day)를 유도한다(저장된 l.day는 신뢰하지 않음).
// 비-극초보 로그만 날짜 오름차순으로 순회하며 레벨별 expected Day를 부여하고, advanced일 때만 한 칸 전진.
function puDayMap() {
  const logs = data.pullup.logs;
  const keys = Object.keys(logs).filter(k => { const l = logs[k]; return l && !l.beginner; }).sort();
  const expected = {}, map = {};
  for (const k of keys) {
    const l = logs[k];
    const lv = l.level || data.pullup.level;
    if (expected[lv] == null) expected[lv] = 1;
    map[k] = expected[lv];
    if (l.advanced) expected[lv] = puNextDayFor(lv, expected[lv]);
  }
  return { map, expected };
}
// 현재 레벨에서 다음에 할 Day(통과 기록 기반)
function puCurrentDay() { const { expected } = puDayMap(); return expected[data.pullup.level] || 1; }

function getPullupLog() {
  const today = activeDateKey();
  const ex = data.pullup.logs[today];
  const curDay = puCurrentDay();
  if (ex && !ex.beginner && ex.level === data.pullup.level && (ex.rest || ex.sets)) {
    // 완료된 오늘 기록은 그 날의 확정 결과이므로 그대로 둔다.
    // 미완료 기록은 현재 유도 Day(통과 기록 기반)에 맞춰 Day/목표를 갱신(입력값은 인덱스대로 보존).
    if (ex.done || ex.day === curDay) return ex;
    const targets = puTargets(curDay);
    if (targets) {
      const old = ex.sets || [];
      ex.sets = targets.map((t, i) => ({ target: t, value: (old[i] && old[i].value) || '', quality: (old[i] && old[i].quality) || null }));
      ex.rest = false;
    } else {
      delete ex.sets;
      ex.rest = true;
    }
    ex.day = curDay;
    return ex;
  }
  const targets = puTargets(curDay);
  data.pullup.logs[today] = targets
    ? { level: data.pullup.level, day: curDay, rest: false, done: false, sets: targets.map(t => ({ target: t, value: '', quality: null })), memo: '' }
    : { level: data.pullup.level, day: curDay, rest: true, done: false, memo: '' };
  return data.pullup.logs[today];
}

// 수준(레벨) 선택 드롭다운
function puLevelSelectHtml() {
  return `<div class="pu-setting">
      <label>내 수준</label>
      <select class="stage-select" style="width:auto;flex:0 0 auto;min-width:140px" onchange="setLevel(this.value)">
        ${PULLUP_LEVELS.map(lv => `<option value="${lv}" ${lv===data.pullup.level?'selected':''}>${PULLUP_TIERS[lv].label}</option>`).join('')}
      </select>
    </div>`;
}
function setLevel(level) {
  if (!PULLUP_TIERS[level]) return;
  data.pullup.level = level;
  // 오늘 로그가 미완료이거나 새 수준과 종류(극초보/그리드)가 다르면 제거 → 새 프로그램으로 재생성
  const today = activeDateKey();
  const l = data.pullup.logs[today];
  if (l) {
    const lKind = l.beginner ? 'beginner' : 'grid';
    const newKind = puGetTier(level).kind;
    if (!l.done || lKind !== newKind) delete data.pullup.logs[today];
  }
  saveData();
  renderActiveTab(activeTab);
  showToast(`${PULLUP_TIERS[level].label} 선택`);
}

// ── 극초보(0개) 단계 진행 ──
function setBeginnerStage(val) {
  data.pullup.beginnerStage = parseInt(val) || 1;
  const l = data.pullup.logs[activeDateKey()];
  if (l && l.beginner && !l.done) l.stage = data.pullup.beginnerStage;
  autoSave();
  renderPullupToday();
}
function getBeginnerLog() {
  const today = activeDateKey();
  const l = data.pullup.logs[today];
  if (l && l.beginner) return l; // 유효한 극초보 로그면 그대로
  const nl = { beginner: true, stage: data.pullup.beginnerStage, value: '', memo: '', done: false };
  data.pullup.logs[today] = nl;
  return nl;
}
function puBeginnerUpdate(val) { const l = getBeginnerLog(); if (l.beginner) { l.value = val; autoSave(); } }
function puBeginnerMemo(val) { const l = getBeginnerLog(); if (l.beginner) { l.memo = val; autoSave(); } }
function completeBeginner() {
  const l = getBeginnerLog();
  if (!(parseFloat(l.value) > 0)) { showToast('오늘 기록을 입력해 주세요'); return; }
  l.done = true; saveData(); showToast('오늘 완료! 💪'); renderPullupToday();
}

function puUpdateSet(i, val) { const l = getPullupLog(); if (!l.sets[i]) l.sets[i] = {}; l.sets[i].value = val; clearTimeout(saveTimer); saveData(); }
function puUpdateMemo(val) { getPullupLog().memo = val; autoSave(); }
function puCycleQuality(i, btn) {
  const l = getPullupLog();
  if (l.rest) return;
  if (!l.sets[i]) l.sets[i] = { value: '' };
  const cur = l.sets[i].quality || null;
  const next = QUALITY_CYCLE[(QUALITY_CYCLE.indexOf(cur)+1) % QUALITY_CYCLE.length];
  l.sets[i].quality = next;
  btn.textContent = qIcon(next);
  btn.className = 'set-quality q-' + (next || 'none');
  autoSave();
}

// 오늘 완료 → 다음 Day로 진행 (한 번만 진행)
// 통과 판정: 모든 세트가 목표 이상이어야 다음 Day 진행 (러시안 파이터 풀업 규칙)
function puDayPassed(l) {
  if (!l.sets) return false;
  return l.sets.every(s => (parseFloat(s.value) || 0) >= (s.target || 0));
}

function completeToday() {
  const l = getPullupLog();
  if (!l.rest && (!l.sets || !l.sets.some(s => parseFloat(s.value) > 0))) {
    showToast('세트를 하나 이상 입력해 주세요');
    return;
  }
  l.done = true;
  const passed = l.rest || puDayPassed(l);
  l.passed = passed;
  if (passed && !l.advanced) {
    // 통과 → 다음 Day로 진행 (한 번만). advanced를 먼저 켠 뒤 puCurrentDay()로 다음 Day 계산.
    l.advanced = true;
    const nextDay = puCurrentDay();
    showToast(l.rest ? `휴식 완료 · 다음 Day ${nextDay}` : `통과! 💪 다음 Day ${nextDay}`);
  } else if (!passed && l.advanced) {
    // 이전엔 통과로 진행했으나 수정 후 미달 → 되돌려 같은 Day 유지
    l.advanced = false;
    showToast(`목표 미달로 변경 · Day ${l.day} 유지`);
  } else if (!passed) {
    // 목표 미달 → 진행 없이 같은 Day 반복
    showToast(`목표 미달 · 다음에 Day ${l.day} 다시 도전`);
  } else {
    showToast('저장됨 ✓');
  }
  saveData();
  renderPullupToday();
}

function renderPullupToday() {
  const c = document.getElementById('today-pullup');
  const isBeginner = puGetTier(data.pullup.level).kind === 'beginner';
  c.innerHTML = puLevelSelectHtml() + (isBeginner ? renderBeginnerToday() : renderGridToday());
}

// 그리드(RM) 수준의 오늘 화면
function renderGridToday() {
  const log = getPullupLog();
  const day = log.day;
  const len = puProgLen();
  // 30일 이후 '이어가기' 구간 안내(재측정 권장)
  const bridgeNote = (len > 30 && day > 30)
    ? `<div style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--accent);line-height:1.6">💡 30일 사이클 이후 <b>이어가기 구간</b>이에요. 2~3일 쉬고 최대 개수를 재측정해, <b>15개에 도달하면 수준을 15RM으로</b> 올리세요.</div>`
    : '';
  const dayBar = `
    <div class="pu-daybar">
      <div class="pu-daynum">${day}</div>
      <div class="pu-dayinfo">
        <div class="pu-daytitle">${data.pullup.level} · Day ${day} / ${len}${log.rest ? ' · 휴식일' : ''}</div>
        <div class="pu-daysub">${log.rest ? '오늘은 쉬어가는 날이에요' : '세트 간 약 5분 휴식 · 첫 세트는 최대로'}</div>
      </div>
    </div>`;

  if (log.rest) {
    return bridgeNote + dayBar + `
      <div class="pu-rest-card">
        <div class="pu-rest-emoji">😴</div>
        <div class="pu-rest-text">휴식일입니다.<br>회복도 훈련의 일부예요.</div>
      </div>
      <button class="save-btn ${log.done ? 'saved' : ''}" onclick="completeToday()">
        ${log.done ? `✓ 완료됨 (다음 Day ${puCurrentDay()})` : '휴식 완료 →'}
      </button>`;
  }

  const setsHtml = log.sets.map((s, i) => `
    <div class="pu-set-row">
      <span class="pu-set-label">세트 ${i+1}</span>
      <span class="pu-target">목표 ${s.target}</span>
      <input class="pu-input" type="number" inputmode="numeric" placeholder="${s.target}"
        value="${s.value||''}" oninput="puUpdateSet(${i},this.value)">
      <span class="set-unit">개</span>
      <button class="set-quality q-${s.quality||'none'}" onclick="puCycleQuality(${i},this)" title="세트 퀄리티">${qIcon(s.quality)}</button>
    </div>`).join('');

  const doneLabel = log.done
    ? (log.passed ? `✓ 통과 (다음 Day ${puCurrentDay()})` : `△ 미달 — Day ${log.day} 재도전`)

  return bridgeNote + dayBar + `
    <div class="chart-card">
      <div class="sets-label">오늘의 세트 · 목표 ${log.sets.map(s => s.target).join(' · ')}</div>

        ⚑ 모든 세트의 <b style="color:var(--text-dim)">목표 개수를 채워야</b> 다음 Day로 진행돼요.<br>
        못 채우면 다음에 <b style="color:var(--text-dim)">같은 Day</b>를 다시 합니다. 반동·킵핑은 빼고 정직하게!
      </div>
      <textarea class="memo-input" rows="2" placeholder="메모 (선택사항)" oninput="puUpdateMemo(this.value)">${log.memo||''}</textarea>
      <button class="save-btn ${log.done ? 'saved' : ''}" onclick="completeToday()">${doneLabel}</button>
    </div>`;

        <span class="set-unit">${stage.unit}</span>
      </div>
      <textarea class="memo-input" rows="2" placeholder="메모 (선택사항)" oninput="puBeginnerMemo(this.value)">${isB ? (log.memo||'') : ''}</textarea>
      <button class="save-btn ${log.done ? 'saved' : ''}" onclick="completeBeginner()">
        ${log.done ? '✓ 오늘 완료됨' : '오늘 완료 →'}
      </button>
    </div>`;
}

function renderProgram() {
  const c = document.getElementById('program-pullup');
  const isBeginner = puGetTier(data.pullup.level).kind === 'beginner';
  c.innerHTML = puLevelSelectHtml() + (isBeginner ? renderBeginnerRoadmap() : renderGridProgram());
}

function renderGridProgram() {
  const prog = puProgramFor(data.pullup.level);
  const cur = puCurrentDay();
  return prog.map((base, idx) => {
    const day = idx + 1;
    const isRest = base === null;
    const isCur = day === cur;
    // 30일 이후는 '이어가기(상위 등급 준비)' 구간 — 구분선 표시
    const divider = (day === 31 && prog.length > 30)
      ? `<div class="section-divider" style="margin:14px 0 8px">── 30일 이후 · 이어가기 (15RM 준비) ──</div>`
      : '';
    return divider + `<div class="pu-prog-row ${isCur?'current':''} ${isRest?'rest':''}">
      <span class="pu-prog-day">Day ${day}</span>
      ${isRest ? '<span class="pu-prog-rest-label">😴 휴식</span>' : `<span class="pu-prog-reps">${base.join(' · ')}</span>`}
      ${isCur ? '<span style="margin-left:auto;font-size:11px;color:var(--accent);font-weight:700">오늘 ▶</span>' : ''}
    </div>`;
  }).join('');
}

function renderBeginnerRoadmap() {
  const cur = data.pullup.beginnerStage;
  return PULLUP_BEGINNER.map(s => {
    const isDone = s.id < cur, isCur = s.id === cur;
    const descHtml = s.desc.split('\n').map(l => `<span style="display:block">${l}</span>`).join('');
    return `
      <div class="roadmap-item ${isDone?'done':''} ${isCur?'current':''}">
        <div class="roadmap-dot">${isDone?'✓':s.id}</div>
        <div class="roadmap-card">
          <div class="roadmap-name">${s.id}. ${s.name}</div>
          <div class="roadmap-desc">${descHtml}</div>
          <span class="roadmap-goal">목표: ${s.target}</span>
        </div>
      </div>`;
  }).join('');
}

// 풀업 기록용 유틸
function puSessionTotal(l) { if (!l || !l.sets) return 0; return l.sets.reduce((a, s) => a + (parseFloat(s.value)||0), 0); }
function puIsWorkout(l) {
  if (!l) return false;
  if (l.beginner) return parseFloat(l.value) > 0;
  return !l.rest && l.sets && l.sets.some(s => parseFloat(s.value) > 0);
}
function puWorkoutDays() {
  return Object.keys(data.pullup.logs).filter(k => puIsWorkout(data.pullup.logs[k]));
}
function calcPullupStreak() {
  const keys = puWorkoutDays().sort().reverse();
  if (!keys.length) return 0;
  let streak = 0, check = getTodayKey();
  for (const k of keys) {
    if (k === check) { streak++; const d = new Date(check+'T00:00:00'); d.setDate(d.getDate()-1); check = d.toISOString().slice(0,10); }
    else if (k < check) break;
  }
  return streak;
}

// 플란체/풀업 공용 트렌드 차트 SVG 생성
function trendChartSvg(points, unit, W) {
  if (points.length < 2) {
    return `<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">기록이 2개 이상 쌓이면<br>트렌드 차트가 나타나요</div>`;
  }
  const H = 120, pad = { t:10, r:10, b:28, l:36 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const maxVal = Math.max(...points.map(p=>p.val)) * 1.15 || 10, minVal = 0;
  const xStep = points.length > 1 ? cw / (points.length-1) : cw;
  const toX = i => pad.l + (points.length>1 ? i*xStep : cw/2);
  const toY = v => pad.t + ch - ((v-minVal)/(maxVal-minVal))*ch;
  const poly = points.map((p,i)=>`${toX(i)},${toY(p.val)}`).join(' ');
  const area = `${toX(0)},${toY(0)} ` + poly + ` ${toX(points.length-1)},${toY(0)}`;
  const yTicks = [0, Math.round(maxVal*0.5), Math.round(maxVal)];
  const xStep2 = Math.max(1, Math.floor(points.length/5));
  const xLabels = points.filter((_,i)=> i===0 || i===points.length-1 || i%xStep2===0);
  return `
    <svg class="trend-chart" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="areaGrad2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c8ff00" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
      </linearGradient></defs>
      ${yTicks.map(v=>`
        <line x1="${pad.l}" y1="${toY(v)}" x2="${W-pad.r}" y2="${toY(v)}" stroke="#2e2e2e" stroke-width="1"/>
        <text x="${pad.l-4}" y="${toY(v)+4}" text-anchor="end" fill="#555" font-size="9">${v}${unit}</text>
      `).join('')}
      <polygon points="${area}" fill="url(#areaGrad2)"/>
      <polyline points="${poly}" fill="none" stroke="#c8ff00" stroke-width="2" stroke-linejoin="round"/>
      ${points.map((p,i)=>`<circle cx="${toX(i)}" cy="${toY(p.val)}" r="3" fill="#c8ff00"/>`).join('')}
      ${xLabels.map(p=>{ const i=points.indexOf(p); const d=new Date(p.date+'T00:00:00'); return `<text x="${toX(i)}" y="${H-4}" text-anchor="middle" fill="#555" font-size="9">${d.getMonth()+1}/${d.getDate()}</text>`; }).join('')}
    </svg>`;
}

function renderPullupHistory() {
  const c = document.getElementById('history-pullup');
  const { map } = puDayMap();  // 통과 기록 기반 Day 표시(저장 l.day 미신뢰)
  const workoutDays = puWorkoutDays();
  const streak = calcPullupStreak();
  const totalDays = workoutDays.length;

  // 주간 요약
  const start = getWeekStart();
  let wDays = 0, wReps = 0;
  workoutDays.forEach(k => {
    if (new Date(k+'T00:00:00') >= start) { wDays++; wReps += puSessionTotal(data.pullup.logs[k]); }
  });

  // 차트: 세션 총 렙
  const points = Object.keys(data.pullup.logs).sort().map(k => {
    const l = data.pullup.logs[k];
    if (!l || l.rest) return null;
    const t = puSessionTotal(l);
    return t > 0 ? { date: k, val: t } : null;
  }).filter(Boolean);
  const cardW = (c.clientWidth || 320) - 32;

  // 캘린더 (이번 달)
  const todayK = getTodayKey();
  const [tyr, tmo] = todayK.split('-').map(Number);
  const yr = tyr, mo = tmo - 1;
  const firstDay = new Date(yr, mo, 1).getDay(), dim = new Date(yr, mo+1, 0).getDate();
  const dnames = ['일','월','화','수','목','금','토'];
  let calHtml = `<div class="cal-grid">` + dnames.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  for (let i=0;i<firstDay;i++) calHtml += `<div class="cal-dot"></div>`;
  for (let d=1; d<=dim; d++) {
    const key = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = puIsWorkout(data.pullup.logs[key]);
    calHtml += `<div class="cal-dot ${has?'has-log':''} ${key===todayK?'today-dot':''}">${d}</div>`;
  }
  calHtml += `</div>`;

  // 기록 리스트 (극초보 단계형 / RM 그리드형 분기)
  const listHtml = Object.keys(data.pullup.logs).sort().reverse().map(k => {
    const l = data.pullup.logs[k];
    if (!puIsWorkout(l)) return '';
    if (l.beginner) {
      const st = PULLUP_BEGINNER.find(s => s.id === l.stage);
      return `
        <div class="history-day">
          <div class="history-date">${formatDate(k)} · 극초보</div>
          <div class="history-entry">
            <button class="hist-del" onclick="deletePullupLog('${k}')" title="기록 삭제">🗑</button>
            <div class="history-entry-name">${st ? st.name : '극초보 단계'} — <strong style="color:var(--accent)">${l.value}${st ? st.unit : ''}</strong></div>
            ${l.memo ? `<div class="history-memo">"${l.memo}"</div>` : ''}
          </div>
        </div>`;
    }
    const total = puSessionTotal(l);
    const rows = l.sets.map((s, i) => {
      const v = parseFloat(s.value) || 0;
      const q = s.quality ? `<span class="q-badge">${qIcon(s.quality)}</span>` : '';
      const hit = (s.target && v >= s.target) ? 'color:var(--success);font-weight:700' : '';
      const tgt = s.target ? `<span style="color:var(--text-muted);font-size:10px">/${s.target}</span>` : '';
      const displayVal = (s.value !== '' && s.value !== null && s.value !== undefined) ? s.value : '-';
      return `<div class="pu-hist-set"><span style="color:var(--text-muted)">세트${i+1}</span> <span style="${hit}">${displayVal}</span>${tgt}${q}</div>`;
    }).join('');
    const passBadge = l.passed === false
      ? ` <span style="color:var(--danger);font-size:11px;font-weight:600">· 미달</span>`
      : (l.passed ? ` <span style="color:var(--success);font-size:11px;font-weight:600">· 통과</span>` : '');
    return `
      <div class="history-day">
        <div class="history-date">${formatDate(k)} · ${l.level||''} Day ${map[k]||l.day}${passBadge}</div>
        <div class="history-entry">
          <button class="hist-del" onclick="deletePullupLog('${k}')" title="기록 삭제">🗑</button>
          <div class="history-entry-name">러시안 파이터 풀업 — 총 <strong style="color:var(--accent)">${total}</strong>개</div>
          <div class="pu-hist-sets">${rows}</div>
          ${l.memo ? `<div class="history-memo">"${l.memo}"</div>` : ''}
        </div>
      </div>`;
  }).join('') || `<div class="empty-state">아직 풀업 기록이 없어요<br>오늘 운동을 시작해보세요 💪</div>`;

  // 진행 상황 라벨
  const tier = puGetTier(data.pullup.level);
  const progressLabel = tier.kind === 'beginner'
    ? `현재 ${(PULLUP_BEGINNER.find(s => s.id === data.pullup.beginnerStage)||{}).name || '극초보'}`
    : `현재 ${data.pullup.level} · Day ${puCurrentDay()}/${puProgLen()}`;

  c.innerHTML = `
    <div class="week-card">
      <div class="week-title">📅 이번 주 요약</div>
      <div class="week-stats">
        <div class="week-stat"><div class="week-stat-num">${wDays}</div><div class="week-stat-label">운동일</div></div>
        <div class="week-stat"><div class="week-stat-num">${wReps}</div><div class="week-stat-label">총 렙</div></div>
        <div class="week-stat"><div class="week-stat-num">${wDays?Math.round(wReps/wDays):0}</div><div class="week-stat-label">일 평균</div></div>
      </div>
    </div>
    <div class="streak-bar">
      <div class="streak-num">${streak}</div>
      <div class="streak-info">
        <div class="streak-title">일 연속 풀업 🔥</div>
        <div class="streak-sub">총 ${totalDays}일 운동 · ${progressLabel}</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>세션 총 렙 트렌드</span></div>
      <div class="chart-wrap">${trendChartSvg(points, '개', cardW)}</div>
    </div>
    <div class="cal-section">
      <div class="cal-label">이번 달 풀업 현황</div>
      ${calHtml}
    </div>
    <div class="section-divider">전체 기록</div>
    ${listHtml}
  `;
  syncDayEndSelect();
}

// 초기 렌더링
renderSwitcher();
initStageSelect();
applyExercise();
renderActiveTab('today');
syncDayEndSelect();

// ── 기능 1: 포그라운드 자동 새로고침 ──
let lastHidden = 0;
let lastTodayKey = getTodayKey();
const RELOAD_AFTER_MS = 30 * 60 * 1000;
let fgGuard = false;
function onForeground() {
  // bfcache 복귀 시 pageshow + visibilitychange:visible가 연달아 발화해
  // onForeground가 두 번 호출되며 불필요한 재렌더가 생기는 것을 한 tick 동안 차단.
  if (fgGuard) return;
  fgGuard = true;
  setTimeout(() => { fgGuard = false; }, 0);
  const away = lastHidden ? Date.now() - lastHidden : 0;
  lastHidden = 0;
  if (away >= RELOAD_AFTER_MS) { location.reload(); return; }
  // 백그라운드 중 논리적 날짜가 넘어갔으면 복귀 즉시 마감 자동 해제(인터벌 대기 없이 UI 일관성 유지)
  if (dayCloseOverride && getTodayKey() >= dayCloseOverride) dayCloseOverride = null;
  const nowKey = getTodayKey();
  const dateChanged = nowKey !== lastTodayKey;
  lastTodayKey = nowKey;
  renderActiveTab(activeTab);
  if (dateChanged) window.scrollTo(0, 0);
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    lastHidden = Date.now(); lastTodayKey = getTodayKey();
    clearTimeout(saveTimer); saveData(); // 앱 백그라운드 시 즉시 저장
  }
  else if (document.visibilityState === 'visible') onForeground();
});
window.addEventListener('pageshow', e => { if (e.persisted) onForeground(); });
// 데스크톱에서 다른 OS 앱으로 전환 시엔 visibilitychange:hidden이 발화하지 않으므로
// blur에서 lastHidden을 기록해야 복귀(focus) 시 onForeground가 의미를 갖는다.
window.addEventListener('blur', () => { if (document.visibilityState === 'visible' && !lastHidden) { lastHidden = Date.now(); lastTodayKey = getTodayKey(); } });
window.addEventListener('focus', () => { if (lastHidden) onForeground(); });

// ── 기능 2: 마감 자동 해제 (논리적 오늘 기준 — dayEndHour 보정 포함) ──
// override는 keyAddDays(getTodayKey(),1) = '논리적 내일'이므로,
// 같은 좌표계인 getTodayKey()로 비교해야 한다. 실제 달력 날짜(new Date)로
// 비교하면 dayEndHour>0 & 새벽 시간대에 마감 직후 즉시 해제되는 버그가 생긴다.
function autoClearDayClose() {
  if (dayCloseOverride && getTodayKey() >= dayCloseOverride) {
    dayCloseOverride = null;
    renderActiveTab(activeTab);
  }
}
setInterval(autoClearDayClose, 30000);
</script>

<!-- ☁ Firebase 클라우드 동기화 (Realtime Database + Google 로그인) -->
<!-- 설정 방법: 아래 firebaseConfig를 Firebase 콘솔의 본인 config로 교체하면 동기화가 켜집니다. -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get, set, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ▼▼▼ 여기를 Firebase 콘솔 > 프로젝트 설정 > 내 앱 의 config로 교체 ▼▼▼
  const firebaseConfig = {
    apiKey: "AIzaSyDIf2hpNjE0x7XukO_NPY2vJdbEvUlNuec",
    authDomain: "calisthenics-4e2f9.firebaseapp.com",
    databaseURL: "https://calisthenics-4e2f9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "calisthenics-4e2f9",
    storageBucket: "calisthenics-4e2f9.firebasestorage.app",
    messagingSenderId: "348411566643",
    appId: "1:348411566643:web:d057fbf4aea1d25ba4e146"
  };
  // ▲▲▲ 여기까지 ▲▲▲

  const statusEl = document.getElementById('cloudStatus');
  const btnEl = document.getElementById('cloudBtn');
  const configReady = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('PASTE');

  if (!configReady) {
    // 아직 config 미설정 → 로컬 전용으로 동작
    statusEl.textContent = '☁ 로컬 저장 (Firebase 미설정)';
    btnEl.style.display = 'none';
  } else {
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let uid = null, saveTimer = null;

    window.cloudSignIn = () =>
      signInWithPopup(auth, new GoogleAuthProvider()).catch(e => alert('로그인 실패: ' + e.message));
    window.cloudSignOut = () => signOut(auth);

    // saveData() 가 호출 → 디바운스로 Realtime Database에 동기화
    window.cloudSave = () => {
      if (!uid) return;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try {
          const d = window.getAppData();
          d.updatedAt = Date.now();
          await set(ref(db, 'users/' + uid),
            { blob: JSON.stringify(d), updatedAt: serverTimestamp() });
          statusEl.textContent = '☁ 동기화됨 · ' + (auth.currentUser?.email || '');
        } catch (e) { console.warn('cloud save 실패', e); }
      }, 800);
    };

    // 클라우드 데이터 적용 + 전체 다시 렌더
    const applyCloud = (cd) => {
      window.setAppData(cd);
      window.clearDemoFlag();
      document.getElementById('demoBanner').style.display = 'none';
      window.initStageSelect();
      window.initChartSelect();
      window.applyExercise();
      window.renderActiveTab(window.getActiveTab());
      window.syncDayEndSelect();
    };
    const renderFresh = () => {
      document.getElementById('demoBanner').style.display = 'none';
      window.initStageSelect();
      window.initChartSelect();
      window.applyExercise();
      window.renderActiveTab(window.getActiveTab());
      window.syncDayEndSelect();
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        uid = user.uid;
        btnEl.textContent = '로그아웃';
        btnEl.setAttribute('onclick', 'cloudSignOut()');
        statusEl.textContent = '☁ ' + (user.email || '로그인됨');
        try {
          const snap = await get(ref(db, 'users/' + uid));
          const cloudData = (snap.exists() && snap.val().blob) ? JSON.parse(snap.val().blob) : null;
          const localDemo = window.isDemoActive();
          if (cloudData) {
            if (localDemo) {
              // 로컬은 데모뿐 → 클라우드 채택
              applyCloud(cloudData);
              window.showToast('클라우드에서 불러옴 ☁');
            } else {
              // 둘 다 실데이터 → 최신 타임스탬프 우선 (로컬 최신본 보호)
              const cloudT = cloudData.updatedAt || 0;
              const localT = window.getAppData().updatedAt || 0;
              if (cloudT >= localT) {
                applyCloud(cloudData);
                window.showToast('클라우드에서 불러옴 ☁');
              } else {
                window.cloudSave();
                window.showToast('로컬이 최신 → 클라우드 갱신 ☁');
              }
            }
          } else {
            // 클라우드 최초(빈 문서)
            if (localDemo) {
              // 데모를 올리지 않고 빈 계정으로 시작
              window.startFresh();
              renderFresh();
              window.cloudSave();
              window.showToast('새 계정으로 시작 ☁');
            } else {
              window.cloudSave();
              window.showToast('클라우드 동기화 시작 ☁');
            }
          }
        } catch (e) { console.warn('cloud load 실패', e); }
      } else {
        uid = null;
        btnEl.textContent = 'Google 로그인';
        btnEl.setAttribute('onclick', 'cloudSignIn()');
        statusEl.textContent = '☁ 로컬 저장 중';
      }
    });
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }
</script>
